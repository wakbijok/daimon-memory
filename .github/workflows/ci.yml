name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build deps (cmake + protoc for -sys crates)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace --locked
      - name: Build (release binaries)
        run: cargo build --release --bin daimon-mcp --bin daimon-indexer --bin daimon

  hooks-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Hook scripts parse and exit 0 with no backend
        run: |
          for f in integrations/*/plugins/daimon-memory/scripts/*.mjs; do
            node --check "$f"
            echo '{}' | DAIMON_ENDPOINT=http://127.0.0.1:9 node "$f" >/dev/null
          done
      - name: Save-nudge unit tests + cross-copy parity
        run: node --test "integrations/tests/"*.test.mjs
      - name: Hermes provider compiles
        run: python3 -m py_compile integrations/hermes/daimon/__init__.py
