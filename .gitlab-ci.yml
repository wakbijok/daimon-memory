# CI for the STAGING remote (git.wakbijok.uk) - the branch the homelab deploys from.
# Runs on the in-cluster k8s runner (tag: k8s): job pods are pinned to celebrimbor
# (12-core bare-metal) and the build reuses the same kaniko registry cache as the manual
# deploy/build-job.yaml, so warm builds are ~2-3 min, cold ~8-12.
#
# test mirrors .github/workflows/ci.yml so deployed code is never untested code.
# test and build-image run in PARALLEL (same stage): the image push is harmless on its
# own, and only deploy - which gates on BOTH - makes it live. Wall time is therefore
# max(test, build) + deploy instead of their sum. build + deploy run on main only:
# kaniko pushes :latest + the Cargo version tag, then deploy rollout-restarts the
# :latest-tracking Deployments (the documented ArgoCD-safe procedure) under the
# gitlab-runner-ci ServiceAccount (deployments-only Role).

stages: [verify, deploy]

test:
  stage: verify
  tags: [k8s]
  variables:
    KUBERNETES_CPU_REQUEST: "4"
    KUBERNETES_MEMORY_REQUEST: "4Gi"
    KUBERNETES_MEMORY_LIMIT: "8Gi"
    CARGO_HOME: $CI_PROJECT_DIR/.cargo
  image: rust:1
  cache:
    key: cargo-$CI_COMMIT_REF_SLUG
    paths:
      - .cargo/registry
      - target
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends cmake protobuf-compiler
  script:
    - cargo test --workspace --locked
    # Client plugin tests (Claude Code + Codex hooks) moved to their own repo's CI:
    # github.com/wakbijok/daimon-memory-plugins

build-image:
  stage: verify
  tags: [k8s]
  rules:
    # Only rebuild the SERVER image when server code/build inputs change — a client
    # integrations/ or docs-only change must not trigger a server rebuild (and so can't
    # be blocked by registry/build issues unrelated to it). test still runs on every push.
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - "crates/**/*"
        - "Cargo.toml"
        - "Cargo.lock"
        - "Dockerfile"
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  variables:
    KUBERNETES_CPU_REQUEST: "4"
    KUBERNETES_MEMORY_REQUEST: "6Gi"
    KUBERNETES_MEMORY_LIMIT: "10Gi"
  script:
    - VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
    - /kaniko/executor
      --context "$CI_PROJECT_DIR"
      --dockerfile Dockerfile
      --destination glcr.wakbijok.uk/daimon/daimon-memory/daimon-mcp:latest
      --destination "glcr.wakbijok.uk/daimon/daimon-memory/daimon-mcp:$VERSION"
      --cache=true
      --cache-repo=glcr.wakbijok.uk/daimon/daimon-memory/cache
      --verbosity=info

deploy:
  stage: deploy
  tags: [k8s]
  rules:
    # Redeploy only when a new server image was built (same paths as build-image).
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - "crates/**/*"
        - "Cargo.toml"
        - "Cargo.lock"
        - "Dockerfile"
  # alpine/k8s: kubectl + a shell (GitLab CI job images need sh; rancher/kubectl is
  # binary-only, bitnami/kubectl is gone from Docker Hub).
  image: alpine/k8s:1.34.6
  script:
    - kubectl -n ai-workloads rollout restart deploy/daimon-mcp deploy/daimon-indexer
    - kubectl -n ai-workloads rollout status deploy/daimon-mcp --timeout=300s
    - kubectl -n ai-workloads rollout status deploy/daimon-indexer --timeout=300s
