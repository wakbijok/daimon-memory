# daimon-memory — full local stack: Postgres + Qdrant + API server + indexer.
#   ./install.sh            # guided setup (writes .env), then starts this
#   docker compose up --build   # or run directly (uses .env / the defaults below)
#
# Config comes from .env (see .env.example). First build compiles the Rust workspace
# (slow once); first server start downloads the embedding model (~130 MB once).
# NOTE: the default password below is an insecure dev default — set DAIMON_PG_PASSWORD.

x-db-env: &db-env
  PGHOST: postgres
  PGPORT: "5432"
  PGUSER: daimon
  PGPASSWORD: ${DAIMON_PG_PASSWORD:-daimon}
  PGDATABASE: daimon_memory
  DAIMON_QDRANT_URL: http://qdrant:6334
  RUST_LOG: info

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: daimon
      POSTGRES_PASSWORD: ${DAIMON_PG_PASSWORD:-daimon}
      POSTGRES_DB: daimon_memory
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daimon -d daimon_memory"]
      interval: 5s
      timeout: 5s
      retries: 12

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrantdata:/qdrant/storage

  # One-shot: apply the schema, then exit.
  migrate:
    build: .
    command: ["daimon", "migrate"]
    environment: *db-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  daimon-mcp:
    build: .
    environment:
      <<: *db-env
      DAIMON_MCP_BIND: 0.0.0.0:8080
      DAIMON_DEFAULT_TENANT: ${DAIMON_DEFAULT_TENANT:-00000000-0000-0000-0000-0000000000d1}
    ports:
      - "${DAIMON_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  daimon-indexer:
    build: .
    command: ["daimon-indexer"]
    environment: *db-env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  qdrantdata:
